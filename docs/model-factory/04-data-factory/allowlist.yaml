# Stage 4 project allowlist (bounded first)
# Expand only with an explicit dated note in the rights manifest.

version: 1
projects:
  - name: axport-all
    cwd_globs:
      - "**/*"
    rights_slice: axport-all-available
    default_upload: tinker_only_after_scrub
    notes: "2026-07-16 operator: use whatever is available via axport."
  - name: allowlisted-oss
    repos: []
    rights_slice: example-public-oss
    default_upload: tinker_only_after_scrub

filters:
  # 2026-07-16 operator: "the more data the better, always" — prefer recall.
  # Still drop failed parses; do not require tool-use for the full-zip train slice.
  min_turns: 2
  require_tool_use: false
  drop_failed_parses: true
  keep_recovery_segments: true
  ensure_synthetic_user: true
  notes: "Max-yield defaults for Stage-5 v2 full R2 export."
